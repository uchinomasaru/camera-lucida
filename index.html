<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カメラ・ルシダ アプリ - 超コンパクト版</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="カメラルシダ">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #333;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden; 
    }
    
    #show-ui-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 100;
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      border: 1px solid #777;
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      display: none;
    }

    #controls {
      padding: 8px; /* パディングを少し狭く */
      background-color: #222;
      display: flex;
      gap: 6px; /* 隙間を狭く */
      align-items: center;
      flex-wrap: wrap; 
      border-bottom: 1px solid #444;
      z-index: 10; 
      max-height: 50vh; 
      overflow-y: auto; 
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #444;
      padding: 4px 8px;
      border-radius: 5px;
      flex-wrap: wrap; 
      font-size: 13px; /* フォントを少し小さく */
    }
    
    #hide-ui-btn {
      background-color: #5cb85c;
      color: white;
      font-weight: bold;
    }

    #video-container {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden; 
      position: relative;
      background-color: #000;
      touch-action: none;
    }
    #workspace {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      transform-origin: center center;
    }
    video {
      max-width: 100%;
      max-height: 100%;
      z-index: 1;
    }
    #reference-image {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
      z-index: 2;
      opacity: 0.5;
      display: none;
      cursor: move;
      user-select: none;
      touch-action: none; 
      pointer-events: auto; 
    }
    
    select, button {
      padding: 5px 8px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      border-radius: 3px;
      background-color: #eee;
      color: #333;
    }
    button:disabled, input[type="range"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* スライダーを短く制限 */
    input[type="range"] {
      width: 70px;
    }

    .locked-btn {
      background-color: #d9534f !important;
      color: white !important;
    }
    #focus-lock-btn {
      background-color: #5bc0de;
      color: white;
    }
    #focus-lock-btn.locked-btn {
      background-color: #f0ad4e !important;
    }
    .active-filter-btn {
      background-color: #3b5998 !important;
      color: white !important;
    }
    
    .svg-filter-hide {
      position: absolute;
      width: 0; height: 0; pointer-events: none;
    }

    /* カメラ設定パネル用 */
    #camera-panel {
      flex-basis: 100%; /* 横幅いっぱいに広げる */
      display: none; /* 初期は隠す */
      background-color: #333;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <!-- SVGフィルター（黒を濃紺にする） -->
  <svg class="svg-filter-hide">
    <filter id="navy-tint">
      <feColorMatrix type="matrix" values="
        0.33 0.33 0.33 0 0
        0.33 0.33 0.33 0 0.15
        0.33 0.33 0.33 0 0.5
        0    0    0    1 0
      " />
    </filter>
  </svg>

  <button id="show-ui-btn">⚙️ メニューを表示</button>

  <div id="controls">
    <!-- 画像を開く (コンパクト版) -->
    <div class="control-group">
      <button id="custom-image-btn">🖼️ 画像</button>
      <input type="file" id="image-input" accept="image/*" style="display: none;">
    </div>

    <!-- スライダー類 -->
    <div class="control-group">
      <label>透過:</label>
      <input type="range" id="opacity-slider" min="0" max="100" value="50">
      <label>サイズ:</label>
      <input type="range" id="scale-slider" min="0.1" max="3" step="0.1" value="1">
    </div>

    <!-- 変形・フィルター（アイコン中心） -->
    <div class="control-group">
      <button id="rotate-btn" title="90度回転">🔄</button>
      <button id="flip-btn" title="左右反転">↔</button>
      <button id="navy-btn">🔵 白黒化</button>
    </div>

    <!-- その他の操作 -->
    <div class="control-group">
      <button id="lock-btn">🔓 ロック</button>
      <button id="camera-settings-btn">⚙️ カメラ</button>
    </div>

    <!-- パネル非表示 -->
    <div class="control-group" style="margin-left: auto;">
      <button id="hide-ui-btn">👁️ 隠す</button>
    </div>

    <!-- カメラ設定（隠しメニュー） -->
    <div class="control-group" id="camera-panel">
      <label for="camera-select">カメラ:</label>
      <select id="camera-select"><option value="">検索中...</option></select>
      <button id="focus-lock-btn" disabled>AFロック</button>
    </div>
  </div>

  <div id="video-container">
    <div id="workspace">
      <video id="camera-view" autoplay playsinline></video>
      <img id="reference-image" alt="お手本画像" draggable="false">
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('camera-view');
    const cameraSelect = document.getElementById('camera-select');
    const imageInput = document.getElementById('image-input');
    const customImageBtn = document.getElementById('custom-image-btn');
    const refImage = document.getElementById('reference-image');
    const workspace = document.getElementById('workspace');
    const videoContainer = document.getElementById('video-container');
    const controlsDiv = document.getElementById('controls');
    
    const opacitySlider = document.getElementById('opacity-slider');
    const scaleSlider = document.getElementById('scale-slider');
    const rotateBtn = document.getElementById('rotate-btn');
    const flipBtn = document.getElementById('flip-btn');
    const navyBtn = document.getElementById('navy-btn');
    const lockBtn = document.getElementById('lock-btn');
    const focusLockBtn = document.getElementById('focus-lock-btn');
    
    const hideUiBtn = document.getElementById('hide-ui-btn');
    const showUiBtn = document.getElementById('show-ui-btn');
    
    const cameraSettingsBtn = document.getElementById('camera-settings-btn');
    const cameraPanel = document.getElementById('camera-panel');

    let currentStream = null;
    let isImageLocked = false;
    let isFocusLocked = false;

    // --- メニュー表示・非表示 ---
    hideUiBtn.addEventListener('click', () => {
      controlsDiv.style.display = 'none';
      showUiBtn.style.display = 'block'; 
    });
    showUiBtn.addEventListener('click', () => {
      controlsDiv.style.display = 'flex';
      showUiBtn.style.display = 'none';  
    });

    // --- カメラ設定メニューの開閉 ---
    cameraSettingsBtn.addEventListener('click', () => {
      if (cameraPanel.style.display === 'none') {
        cameraPanel.style.display = 'flex';
        cameraSettingsBtn.classList.add('active-filter-btn');
      } else {
        cameraPanel.style.display = 'none';
        cameraSettingsBtn.classList.remove('active-filter-btn');
      }
    });

    // --- カスタム画像選択ボタン ---
    customImageBtn.addEventListener('click', () => {
      imageInput.click(); // 隠した本来のボタンを自動クリック
    });

    // --- 1. カメラ処理 ---
    async function init() {
      await startCamera(null, true);
      await getCameras();
      navigator.mediaDevices.addEventListener('devicechange', getCameras);
    }

    async function getCameras() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        cameraSelect.innerHTML = ''; 
        if (videoDevices.length === 0) return cameraSelect.innerHTML = '<option>カメラなし</option>';
        let externalId = null;
        videoDevices.forEach((d, i) => {
          const opt = document.createElement('option');
          opt.value = d.deviceId;
          opt.text = d.label || `カメラ ${i + 1}`;
          cameraSelect.appendChild(opt);
          if (opt.text.toLowerCase().includes('usb') || opt.text.toLowerCase().includes('external')) externalId = d.deviceId;
        });
        if (!externalId && videoDevices.length > 1) externalId = videoDevices[videoDevices.length - 1].deviceId;
        cameraSelect.value = externalId ? externalId : videoDevices[0].deviceId;
        if(externalId) await startCamera(externalId);
      } catch (err) { console.error(err); }
    }

    async function startCamera(deviceId = null, preferExt = false) {
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());
      const constraints = { video: { width: { ideal: 1920 }, height: { ideal: 1080 } } };
      if (deviceId) constraints.video.deviceId = { exact: deviceId };
      else if (preferExt) constraints.video.facingMode = { ideal: "environment" };
      try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        videoElement.srcObject = currentStream;
        checkFocusCapabilities();
      } catch (err) {
        if (preferExt) startCamera(null, false);
      }
    }
    cameraSelect.addEventListener('change', () => startCamera(cameraSelect.value));

    function checkFocusCapabilities() {
      if (!currentStream) return;
      const track = currentStream.getVideoTracks()[0];
      const capabilities = track.getCapabilities ? track.getCapabilities() : {};
      if (capabilities.focusMode && capabilities.focusMode.includes('manual')) {
        focusLockBtn.disabled = false;
        focusLockBtn.textContent = '🔓 AFロック';
        focusLockBtn.classList.remove('locked-btn');
        isFocusLocked = false;
      } else {
        focusLockBtn.disabled = true;
        focusLockBtn.textContent = '未対応';
        focusLockBtn.classList.remove('locked-btn');
      }
    }

    focusLockBtn.addEventListener('click', async () => {
      if (!currentStream) return;
      const track = currentStream.getVideoTracks()[0];
      if (track.getCapabilities && track.getCapabilities().focusMode) {
        try {
          if (!isFocusLocked) {
            await track.applyConstraints({ advanced: [{ focusMode: "manual" }] });
            isFocusLocked = true;
            focusLockBtn.textContent = '🔒 ピント固定';
            focusLockBtn.classList.add('locked-btn');
          } else {
            await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
            isFocusLocked = false;
            focusLockBtn.textContent = '🔓 AFロック';
            focusLockBtn.classList.remove('locked-btn');
          }
        } catch (err) {
          console.error(err);
        }
      }
    });

    // --- 2. 画像操作のロック ---
    lockBtn.addEventListener('click', () => {
      isImageLocked = !isImageLocked;
      if (isImageLocked) {
        lockBtn.textContent = '🔒 解除';
        lockBtn.classList.add('locked-btn');
        opacitySlider.disabled = true;
        scaleSlider.disabled = true;
        rotateBtn.disabled = true;
        flipBtn.disabled = true;
        navyBtn.disabled = true;
        refImage.style.cursor = 'default';
        workspace.style.cursor = 'grab'; 
      } else {
        lockBtn.textContent = '🔓 ロック';
        lockBtn.classList.remove('locked-btn');
        opacitySlider.disabled = false;
        scaleSlider.disabled = false;
        rotateBtn.disabled = false;
        flipBtn.disabled = false;
        navyBtn.disabled = false;
        refImage.style.cursor = 'move';
        workspace.style.cursor = 'default';
      }
    });

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          refImage.src = event.target.result;
          refImage.style.display = 'block';
          resetImageTransform();
        };
        reader.readAsDataURL(file);
      }
    });

    opacitySlider.addEventListener('input', (e) => {
      refImage.style.opacity = e.target.value / 100;
    });

    // --- 3. 画像単体の変形 ---
    let imgPosX = 0, imgPosY = 0, imgScale = 1, imgRotate = 0, imgFlipX = 1;
    let isNavy = false;

    function updateImageTransform() {
      refImage.style.transform = `translate(${imgPosX}px, ${imgPosY}px) rotate(${imgRotate}deg) scale(${imgScale * imgFlipX}, ${imgScale})`;
    }
    
    function resetImageTransform() {
      imgPosX = 0; imgPosY = 0; imgScale = 1; imgRotate = 0; imgFlipX = 1;
      scaleSlider.value = 1;
      
      isNavy = false;
      refImage.style.filter = 'none';
      navyBtn.textContent = '🔵 白黒化';
      navyBtn.classList.remove('active-filter-btn');
      
      updateImageTransform();
    }

    scaleSlider.addEventListener('input', (e) => {
      imgScale = parseFloat(e.target.value);
      updateImageTransform();
    });

    rotateBtn.addEventListener('click', () => {
      imgRotate -= 90;
      updateImageTransform();
    });

    flipBtn.addEventListener('click', () => {
      imgFlipX *= -1; 
      updateImageTransform();
    });

    navyBtn.addEventListener('click', () => {
      isNavy = !isNavy;
      if (isNavy) {
        refImage.style.filter = 'url(#navy-tint)';
        navyBtn.textContent = '🎨 カラー';
        navyBtn.classList.add('active-filter-btn');
      } else {
        refImage.style.filter = 'none';
        navyBtn.textContent = '🔵 白黒化';
        navyBtn.classList.remove('active-filter-btn');
      }
    });

    // --- 4. マウス＆タッチのドラッグ・ズーム処理 ---
    let isDraggingImage = false;
    let isDraggingGlobal = false;

    let startMouseX = 0, startMouseY = 0;
    let startImgPosX = 0, startImgPosY = 0;
    
    let globalScale = 1;
    let globalX = 0, globalY = 0;
    let startGlobalX = 0, startGlobalY = 0;
    let initialPinchDistance = null;
    let initialGlobalScale = 1;

    function updateGlobalTransform() {
      workspace.style.transform = `translate(${globalX}px, ${globalY}px) scale(${globalScale})`;
    }
    function resetGlobalZoom() {
      globalScale = 1; globalX = 0; globalY = 0;
      updateGlobalTransform();
    }

    videoContainer.addEventListener('dblclick', () => {
      if (isImageLocked) resetGlobalZoom();
    });
    videoContainer.addEventListener('wheel', (e) => {
      if (!isImageLocked) return;
      e.preventDefault();
      const zoomSpeed = 0.1;
      if (e.deltaY < 0) globalScale += zoomSpeed;
      else globalScale -= zoomSpeed;
      globalScale = Math.max(1, Math.min(globalScale, 5));
      if (globalScale === 1) { globalX = 0; globalY = 0; }
      updateGlobalTransform();
    }, { passive: false });

    function startImageDrag(clientX, clientY) {
      if (isImageLocked) return;
      isDraggingImage = true;
      startMouseX = clientX;
      startMouseY = clientY;
      startImgPosX = imgPosX;
      startImgPosY = imgPosY;
    }

    refImage.addEventListener('mousedown', (e) => {
      startImageDrag(e.clientX, e.clientY);
      e.preventDefault();
      e.stopPropagation(); 
    });

    refImage.addEventListener('touchstart', (e) => {
      if (isImageLocked) return;
      if (e.touches.length === 1) { 
        startImageDrag(e.touches[0].clientX, e.touches[0].clientY);
        e.preventDefault();
        e.stopPropagation();
      }
    }, { passive: false });

    function startGlobalDrag(clientX, clientY) {
      if (!isImageLocked) return;
      isDraggingGlobal = true;
      startMouseX = clientX;
      startMouseY = clientY;
      startGlobalX = globalX;
      startGlobalY = globalY;
      workspace.style.cursor = 'grabbing';
    }

    workspace.addEventListener('mousedown', (e) => {
      startGlobalDrag(e.clientX, e.clientY);
      e.preventDefault();
    });

    workspace.addEventListener('touchstart', (e) => {
      if (!isImageLocked) return;
      if (e.touches.length === 2) {
        initialPinchDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        initialGlobalScale = globalScale;
        e.preventDefault();
      } else if (e.touches.length === 1) {
        startGlobalDrag(e.touches[0].clientX, e.touches[0].clientY);
        e.preventDefault();
      }
    }, { passive: false });

    function handleMove(clientX, clientY) {
      if (isDraggingImage) {
        imgPosX = startImgPosX + (clientX - startMouseX);
        imgPosY = startImgPosY + (clientY - startMouseY);
        updateImageTransform();
      } else if (isDraggingGlobal) {
        globalX = startGlobalX + (clientX - startMouseX);
        globalY = startGlobalY + (clientY - startMouseY);
        updateGlobalTransform();
      }
    }

    document.addEventListener('mousemove', (e) => {
      if (isDraggingImage || isDraggingGlobal) {
        handleMove(e.clientX, e.clientY);
      }
    });

    document.addEventListener('touchmove', (e) => {
      if (isDraggingImage || isDraggingGlobal) {
        handleMove(e.touches[0].clientX, e.touches[0].clientY);
        e.preventDefault(); 
      } else if (isImageLocked && e.touches.length === 2 && initialPinchDistance) {
        const currentDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        globalScale = initialGlobalScale * (currentDistance / initialPinchDistance);
        globalScale = Math.max(1, Math.min(globalScale, 5));
        updateGlobalTransform();
        e.preventDefault();
      }
    }, { passive: false });

    function endDrag() {
      isDraggingImage = false;
      isDraggingGlobal = false;
      initialPinchDistance = null;
      if (isImageLocked) workspace.style.cursor = 'grab';
    }

    document.addEventListener('mouseup', endDrag);
    document.addEventListener('touchend', endDrag);

    init();
  </script>
</body>
</html>
